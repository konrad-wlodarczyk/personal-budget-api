services:
  db:
    image: postgres:16
    container_name: personal_budget_db
    environment:
      POSTGRES_DB: personal_budget_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d personal_budget_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: personal_budget_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/personal_budget_db
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"